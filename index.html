<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERSIA Countdown</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#000,#181200,#000);
color:white;
overflow:hidden;
}

.youtube-btn{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff0000;
color:#fff;
text-decoration:none;
padding:12px 30px;
border-radius:50px;
font-size:18px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,0,0,.6);
transition:.3s;
z-index:1000;
}

.youtube-btn:hover{
background:#cc0000;
transform:translateX(-50%) scale(1.08);
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:70px;
color:#FFD700;
text-shadow:0 0 10px gold,0 0 30px gold;
margin-bottom:10px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

.subtitle{
color:#d4af37;
margin-bottom:40px;
letter-spacing:4px;
font-size:20px;
}

.timer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.box{
background:rgba(255,215,0,.08);
border:1px solid gold;
border-radius:15px;
padding:20px;
width:120px;
box-shadow:0 0 15px rgba(255,215,0,.3);
}

.number{
font-size:38px;
font-weight:bold;
color:gold;
}

.label{
margin-top:10px;
font-size:14px;
color:#ddd;
}

.footer{
margin-top:35px;
color:#FFD700;
font-size:18px;
}

@media(max-width:600px){
h1{font-size:45px;}
.box{width:95px;padding:15px;}
.number{font-size:28px;}
.youtube-btn{
font-size:16px;
padding:10px 22px;
}
}
</style>
</head>

<body>

<a class="youtube-btn"
href="https://youtube.com/@kayuzauz?si=20NfL0krVdYFMipu"
target="_blank">
▶ YouTube
</a>

<div class="container">

<h1>PERSIA</h1>
<div class="subtitle">DEBUT COUNTDOWN</div>

<div class="timer">

<div class="box">
<div id="years" class="number">0</div>
<div class="label">YEARS</div>
</div>

<div class="box">
<div id="days" class="number">0</div>
<div class="label">DAYS</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">HOURS</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">MINUTES</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">SECONDS</div>
</div>

</div>

<div class="footer">
30 June 2030 • 18:00 (UZT)
</div>

</div>

<script>
const target = new Date("2030-06-30T18:00:00+05:00");

function updateCountdown() {
  const now = new Date();
  let diff = target - now;

  if (diff <= 0) {
    document.body.innerHTML =
    "<h1 style='color:gold;text-align:center;'>🎉 PERSIA IS LIVE! 🎉</h1>";
    return;
  }

  const second = 1000;
  const minute = second * 60;
  const hour = minute * 60;
  const day = hour * 24;

  const years = Math.floor(diff / (day * 365.25));
  diff -= years * day * 365.25;

  const days = Math.floor(diff / day);
  diff -= days * day;

  const hours = Math.floor(diff / hour);
  diff -= hours * hour;

  const minutes = Math.floor(diff / minute);
  diff -= minutes * minute;

  const seconds = Math.floor(diff / second);

  document.getElementById("years").textContent = years;
  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>

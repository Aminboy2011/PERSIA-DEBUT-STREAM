<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERSIA Countdown</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#3b2a00 0%,#000 70%);
z-index:-2;
}

body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(#FFD700 1px, transparent 1px);
background-size:40px 40px;
opacity:.15;
z-index:-1;
}

.container{
text-align:center;
width:90%;
max-width:1200px;
}

h1{
font-size:80px;
color:#FFD700;
text-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700,
0 0 40px #ffae00;
margin-bottom:15px;
}

.subtitle{
color:#FFD700;
letter-spacing:8px;
margin-bottom:60px;
font-size:22px;
}

.timer{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.box{
width:180px;
padding:30px;
border:2px solid #FFD700;
border-radius:20px;
background:rgba(255,215,0,.05);
backdrop-filter:blur(8px);
box-shadow:0 0 20px rgba(255,215,0,.3);
}

.box span{
display:block;
font-size:60px;
color:#FFD700;
font-weight:bold;
text-shadow:0 0 15px gold;
}

.box p{
margin-top:15px;
font-size:20px;
color:#FFD700;
}

.footer{
margin-top:60px;
font-size:22px;
letter-spacing:4px;
color:#FFD700;
}

@media(max-width:700px){

h1{
font-size:50px;
}

.box{
width:140px;
padding:20px;
}

.box span{
font-size:42px;
}

}
</style>
</head>
<body>

<div class="container">

<h1>PERSIA</h1>

<div class="subtitle">4 YEAR COUNTDOWN</div>

<div class="timer">

<div class="box">
<span id="days">0</span>
<p>DAYS</p>
</div>

<div class="box">
<span id="hours">0</span>
<p>HOURS</p>
</div>

<div class="box">
<span id="minutes">0</span>
<p>MINUTES</p>
</div>

<div class="box">
<span id="seconds">0</span>
<p>SECONDS</p>
</div>

</div>

<div class="footer">
TIME IS RUNNING...
</div>

</div>

<script>
const target = new Date("2030-06-30T18:00:00+05:00");

function update(){

const now=new Date().getTime();
const diff=target-now;

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

if(diff<=0){
document.body.innerHTML="<h1 style='color:gold'>PERSIA IS LIVE!</h1>";
}
}

update();
setInterval(update,1000);
</script>

</body>
</html>
